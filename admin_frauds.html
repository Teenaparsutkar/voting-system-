<!doctype html>
<html>
<head><title>Fraud Logs</title></head>
<body>
  <h1>Fraud Logs</h1>
  <table border="1">
    <tr><th>Aadhar</th><th>Name</th><th>Activity</th><th>Similarity</th><th>Extra</th><th>Time</th></tr>
    {% for f in frauds %}
    <tr>
      <td>{{ f.aadhar }}</td>
      <td>{{ f.name }}</td>
      <td>{{ f.activity }}</td>
      <td>{{ f.similarity }}</td>
      <td>{{ f.extra }}</td>
      <td>{{ f.timestamp }}</td>
    </tr>
    {% endfor %}
  </table>

  <p><a href="{{ url_for('admin_dashboard') }}">Back to dashboard</a></p>
</body>
</html>
