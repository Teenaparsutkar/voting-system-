<!DOCTYPE html>
<html>
<head>
    <title>Error</title>
    <style>
        body {
            font-family: Arial;
            background: #ffeeee;
            padding: 40px;
        }
        .box {
            background: white;
            padding: 20px;
            border: 2px solid red;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            text-align: center;
        }
        a {
            margin-top: 20px;
            display: inline-block;
            text-decoration: none;
            color: blue;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:red;">Error</h2>
        <p>{{ message }}</p>
        <a href="{{ url_for('home') }}">Back to Home</a>
    </div>
</body>
</html>
