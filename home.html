<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Voting System</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f4f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        .container {
            background: #fff;
            padding: 40px 50px;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.15);
            text-align: center;
            width: 420px;
        }

        h2 {
            color: #2c3e50;
            font-size: 26px;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            background: #007bff;
            padding: 12px 25px;
            margin: 10px;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            text-decoration: none;
            transition: 0.3s ease;
            width: 120px;
        }

        .btn:hover {
            background: #0056b3;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Online Voting System</h2>

    <a href="/register" class="btn">Register</a>
    <a href="/login" class="btn">Login</a>
    <a href="{{ url_for('admin_login') }}" 
   style="display:inline-block; padding:10px 20px; background:#333; color:white; 
          border-radius:5px; text-decoration:none; margin-top:20px;">
    Admin Login
</a>

</div>

</body>
</html>
