<!-- templates/success.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vote Submitted - Online Voting</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f4f7fb;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #ffffff;
            padding: 40px 50px;
            width: 500px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.15);
            animation: fadeIn 0.7s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        h2 {
            color: #2e7d32;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .tick {
            font-size: 60px;
            color: #2ecc71;
            margin-bottom: 10px;
        }

        a {
            margin-top: 20px;
            display: inline-block;
            background: #007bff;
            padding: 12px 25px;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
        }

        a:hover {
            background: #0056b3;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="tick"></div>

    <h2>Your vote for <strong>{{ party }}</strong> has been successfully submitted!</h2>

    <a href="{{ url_for('home') }}">Back to Home</a>
</div>

</body>
</html>
