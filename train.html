<!-- templates/train.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Train Embeddings - Online Voting</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 60px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            font-size: 14px;
        }

        .msg-list {
            list-style: none;
            padding: 0;
            margin-bottom: 15px;
            color: green;
            font-weight: bold;
        }

        button {
            background: #4CAF50;
            color: white;
            padding: 10px 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }

        button:hover {
            background: #45a049;
        }

        a {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #007bff;
            font-size: 14px;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Generate Embeddings for {{ name }}</h2>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <ul class="msg-list">
                    {% for msg in messages %}
                        <li>{{ msg }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}

        <p>Click the button below to generate embeddings for the captured images.</p>

        <form method="POST">
            <button type="submit">Generate Embeddings</button>
        </form>

        <a href="{{ url_for('home') }}">⬅ Back to Home</a>
    </div>
</body>
</html>
