<!-- templates/verify.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Face Verification - Online Voting</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 60px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            font-size: 14px;
        }

        .error-list {
            list-style: none;
            padding: 0;
            margin-bottom: 15px;
            color: red;
            font-weight: bold;
        }

        button {
            background: #007bff;
            color: white;
            padding: 10px 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }

        button:hover {
            background: #0069d9;
        }

        a {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #007bff;
            font-size: 14px;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>

</head>
<body>

    <div class="container">
        <h2>Face Verification for {{ name }}</h2>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <ul class="error-list">
                    {% for msg in messages %}
                        <li>{{ msg }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}

        <p>Click below to verify your face using your webcam.</p>

        <form method="POST">
            <button type="submit">Verify Face</button>
        </form>

        <a href="{{ url_for('login') }}">⬅ Back to Login</a>
    </div>

</body>
</html>
