<!-- templates/vote.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Vote - Online Voting</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 420px;
            margin: 60px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .options {
            text-align: left;
            margin-left: 40px;
            font-size: 15px;
            color: #444;
        }

        .options input {
            margin-right: 10px;
        }

        button {
            background: #28a745;
            color: white;
            padding: 10px 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 20px;
        }

        button:hover {
            background: #218838;
        }

        a {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #007bff;
            font-size: 14px;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>

</head>
<body>

    <div class="container">
        <h2>Welcome, {{ name }}. Cast Your Vote</h2>

        <form method="POST">
            <div class="options">
                {% for party in parties %}
                    <label>
                        <input type="radio" name="party" value="{{ party }}" required>
                        {{ party }}
                    </label>
                    <br><br>
                {% endfor %}
            </div>

            <button type="submit">Submit Vote</button>
        </form>

        <a href="{{ url_for('home') }}">⬅ Back to Home</a>
    </div>

</body>
</html>
